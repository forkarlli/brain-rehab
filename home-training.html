<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCF 居家眼動訓練</title>
<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;overflow:hidden}
#app{width:100vw;height:100vh;position:relative}

/* ── pages ── */
.page{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.page.active{display:flex}

/* ── welcome ── */
#pg-welcome{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)}
.logo{font-size:48px;margin-bottom:8px}
.app-title{font-size:28px;font-weight:700;color:#38bdf8;margin-bottom:4px}
.app-sub{font-size:14px;color:#94a3b8;margin-bottom:32px}
.stats-row{display:flex;gap:20px;margin-bottom:36px}
.stat-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px 32px;text-align:center}
.stat-num{font-size:36px;font-weight:700;color:#38bdf8}
.stat-label{font-size:12px;color:#94a3b8;margin-top:4px}
.patient-input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 16px;color:#f1f5f9;font-size:15px;width:260px;margin-bottom:24px;text-align:center}
.patient-input::placeholder{color:#64748b}
.btn{padding:14px 36px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(14,165,233,.4)}
.btn-secondary{background:rgba(255,255,255,.1);color:#cbd5e1;border:1px solid rgba(255,255,255,.15)}
.btn-secondary:hover{background:rgba(255,255,255,.15)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── camera setup ── */
#pg-camera{background:#0f172a}
#webcam-preview{width:320px;height:240px;border-radius:16px;object-fit:cover;border:2px solid #1e40af;margin:20px 0;transform:scaleX(-1)}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.dot-green{background:#22c55e}
.dot-yellow{background:#f59e0b;animation:pulse 1s infinite}
.dot-red{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:14px;color:#94a3b8;display:flex;align-items:center;margin-bottom:16px}

/* ── calibration ── */
#pg-calibration{background:#111827}
#calib-canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;z-index:9999}
#webgazerVideoContainer,#webgazerFaceOverlay,#webgazerVideoFeed,video{pointer-events:none!important}
#calib-instruction{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:12px 24px;border-radius:12px;font-size:15px;color:#e2e8f0;pointer-events:none;text-align:center}
#calib-progress{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#94a3b8;font-size:13px}

/* ── training canvas ── */
#pg-training{background:#0a0a0a;padding:0}
#train-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#train-hud{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:16px;align-items:center;pointer-events:none}
.hud-chip{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 16px;font-size:13px;color:#e2e8f0}
#train-timer{color:#f59e0b;font-weight:700}
#train-label{color:#38bdf8;font-weight:600}
#gaze-dot{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,100,100,.7);background:rgba(255,100,100,.3);pointer-events:none;transform:translate(-50%,-50%);transition:left .05s,top .05s;display:none}

/* ── results ── */
#pg-results{background:linear-gradient(135deg,#0f172a 0%,#1a2744 100%)}
.result-title{font-size:24px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.score-ring{width:140px;height:140px;position:relative;margin:20px auto}
.score-ring svg{transform:rotate(-90deg)}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-num{font-size:36px;font-weight:800;color:#38bdf8}
.score-sub{font-size:11px;color:#64748b}
.result-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px;margin:16px 0}
.result-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px}
.result-card-label{font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.result-card-val{font-size:20px;font-weight:700;color:#e2e8f0}
.bias-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:4px}
.bias-right{background:rgba(234,179,8,.15);color:#fbbf24;border:1px solid rgba(234,179,8,.3)}
.bias-left{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.bias-center{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.ai-feedback{background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:12px;padding:16px;max-width:420px;width:100%;margin:12px 0;font-size:13px;line-height:1.7;color:#cbd5e1;text-align:left}
.feedback-label{font-size:11px;color:#0ea5e9;font-weight:700;margin-bottom:6px;letter-spacing:.5px}
.btn-row{display:flex;gap:12px;margin-top:8px}

/* ── loading overlay ── */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.active{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#94a3b8;font-size:14px}

/* ── toast ── */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 24px;font-size:14px;color:#e2e8f0;transition:transform .3s;z-index:1000;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- PAGE: WELCOME -->
  <div id="pg-welcome" class="page active">
    <div class="logo">👁️</div>
    <div class="app-title">居家眼動訓練</div>
    <div class="app-sub">BCF 大腦活化復健系統</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-streak">0</div>
        <div class="stat-label">連續天數 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">總訓練次數</div>
      </div>
    </div>
    <input class="patient-input" id="patient-id-input" placeholder="輸入病人ID（如 P001）" />
    <button class="btn btn-primary" id="btn-start-setup" onclick="startSetup()">開始今日訓練</button>
  </div>

  <!-- PAGE: CAMERA -->
  <div id="pg-camera" class="page">
    <h2 style="font-size:22px;font-weight:700;margin-bottom:4px">開啟相機</h2>
    <p style="color:#94a3b8;font-size:14px;margin-bottom:20px">請確保臉部清晰可見，光線充足</p>
    <video id="webcam-preview" autoplay muted playsinline></video>
    <div class="status-text" id="cam-status">
      <span class="status-dot dot-yellow"></span>等待相機授權…
    </div>
    <button class="btn btn-primary" id="btn-go-calib" onclick="goCalibration()" disabled>開始校準</button>
  </div>

  <!-- PAGE: CALIBRATION -->
  <div id="pg-calibration" class="page">
    <canvas id="calib-canvas"></canvas>
    <div id="calib-instruction">請依序注視並點擊每個白點（共9點）</div>
    <div id="calib-progress">0 / 9</div>
  </div>

  <!-- PAGE: TRAINING -->
  <div id="pg-training" class="page">
    <canvas id="train-canvas"></canvas>
    <div id="train-hud">
      <div class="hud-chip" id="train-label">準備中…</div>
      <div class="hud-chip">⏱ <span id="train-timer">0s</span></div>
      <div class="hud-chip" id="train-phase-chip">1/10</div>
      <div class="hud-chip" id="train-speed-chip">速度：慢</div>
      <div class="hud-chip" id="train-fatigue-chip" style="color:#4ade80">疲勞：良好</div>
    </div>
    <div id="gaze-dot"></div>
  </div>

  <!-- PAGE: RESULTS -->
  <div id="pg-results" class="page">
    <div class="result-title">訓練完成 ✨</div>
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#1e293b" stroke-width="12"/>
        <circle id="score-arc" cx="70" cy="70" r="58" fill="none" stroke="#38bdf8" stroke-width="12"
          stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round"/>
      </svg>
      <div class="score-center">
        <div class="score-num" id="score-display">--</div>
        <div class="score-sub">綜合分數</div>
      </div>
    </div>
    <div class="result-cards">
      <div class="result-card">
        <div class="result-card-label">追蹤準確度</div>
        <div class="result-card-val" id="res-pursuit">--</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">穩定度</div>
        <div class="result-card-val" id="res-stability">--</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">偏側方向</div>
        <div class="result-card-val" id="res-bias">--</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">訓練時長</div>
        <div class="result-card-val" id="res-duration">--</div>
      </div>
    </div>
    <div class="ai-feedback">
      <div class="feedback-label">🤖 AI 回饋</div>
      <div id="ai-feedback-text">分析中…</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="showPage('pg-welcome')">返回首頁</button>
      <button class="btn btn-primary" onclick="startSetup()">再練一次</button>
    </div>
  </div>

</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">載入中…</div>
</div>
<div id="toast"></div>

<script>
'use strict';
const BCF_API = 'https://brain-rehab-production.up.railway.app';
const STORAGE_KEY = 'bcf_home_training';

// ── state ──
let patientId = '';
let gazeData  = [];       // [{x,y,t}]
let trainStartTime = 0;
let webgazerReady  = false;
let animFrame      = null;

// ── utils ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLoading(msg='處理中…') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-overlay').classList.add('active');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }
function toast(msg, dur=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── localStorage helpers ──
function getStore() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStore(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function updateWelcomeStats() {
  const store = getStore();
  const sessions = store.sessions || [];
  document.getElementById('stat-total').textContent = sessions.length;
  // streak
  const today = new Date().toISOString().slice(0,10);
  const days = [...new Set(sessions.map(s => s.date?.slice(0,10)))].sort().reverse();
  let streak = 0;
  let cursor = new Date();
  for (const d of days) {
    const diff = Math.round((cursor - new Date(d)) / 86400000);
    if (diff <= 1) { streak++; cursor = new Date(d); }
    else break;
  }
  document.getElementById('stat-streak').textContent = streak;
}

// ── welcome ──
window.addEventListener('DOMContentLoaded', () => {
  updateWelcomeStats();
  const stored = getStore();
  if (stored.lastPatientId) document.getElementById('patient-id-input').value = stored.lastPatientId;
});

function startSetup() {
  patientId = document.getElementById('patient-id-input').value.trim();
  if (!patientId) { toast('請輸入病人ID'); return; }
  const store = getStore();
  store.lastPatientId = patientId;
  saveStore(store);
  showPage('pg-camera');
  initCamera();
}

// ── camera ──
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width:640, height:480, facingMode:'user' } });
    const vid = document.getElementById('webcam-preview');
    vid.srcObject = stream;
    const camStatus = document.getElementById('cam-status');
    camStatus.innerHTML = '<span class="status-dot dot-green"></span>相機已就緒';
    document.getElementById('btn-go-calib').disabled = false;
    // init webgazer quietly
    showLoading('初始化眼動追蹤…');
    await webgazer.setGazeListener(null).begin();
    webgazer.showPredictionPoints(false).showVideoPreview(false);
    webgazerReady = true;
    hideLoading();
  } catch(e) {
    console.error(e);
    document.getElementById('cam-status').innerHTML = '<span class="status-dot dot-red"></span>相機授權失敗，請允許相機存取';
    hideLoading();
    toast('相機啟動失敗：' + e.message);
  }
}

// ── calibration ──
const CALIB_POINTS = [
  [.1,.1],[.5,.1],[.9,.1],
  [.1,.5],[.5,.5],[.9,.5],
  [.1,.9],[.5,.9],[.9,.9]
];
let calibIdx = 0;

function goCalibration() {
  showPage('pg-calibration');
  document.querySelectorAll('#webgazerVideoContainer, video')
    .forEach(el => el.style.pointerEvents = 'none');
  calibIdx = 0;
  renderCalibPoint();
}

function renderCalibPoint() {
  const canvas = document.getElementById('calib-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (calibIdx >= CALIB_POINTS.length) {
    document.getElementById('calib-instruction').textContent = '校準完成！開始訓練 🎉';
    setTimeout(startTraining, 1000);
    return;
  }

  const [rx, ry] = CALIB_POINTS[calibIdx];
  const px = rx * canvas.width;
  const py = ry * canvas.height;

  // draw all remaining faint
  CALIB_POINTS.forEach(([x,y],i) => {
    if (i <= calibIdx) return;
    ctx.beginPath(); ctx.arc(x*canvas.width, y*canvas.height, 10, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // active point
  ctx.beginPath(); ctx.arc(px, py, 14, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  document.getElementById('calib-progress').textContent = `${calibIdx} / ${CALIB_POINTS.length}`;

  const onCalibTap = async (e) => {
    e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const dist = Math.hypot(cx - px, cy - py);
    if (dist > 80) return;

    canvas.removeEventListener('touchstart', onCalibTap);
    canvas.removeEventListener('click',      onCalibTap);
    if (webgazerReady) {
      try { await webgazer.recordScreenPosition(px, py, 'click'); } catch {}
    }
    calibIdx++;
    renderCalibPoint();
  };
  canvas.addEventListener('touchstart', onCalibTap, { passive: false });
  canvas.addEventListener('click',      onCalibTap);
}

// ── PATH SYSTEM ──
const PURSUIT_LEVELS = [
  { speed: 0.3, amplitude: 0.30, label: '慢' },
  { speed: 0.6, amplitude: 0.65, label: '中' },
  { speed: 1.0, amplitude: 0.90, label: '快' },
];

const PATH_META = {
  H_RIGHT:       { label: 'H水平右', color: '#38bdf8' },
  H_LEFT:        { label: 'H水平左', color: '#38bdf8' },
  V_UP:          { label: 'V垂直上',  color: '#a78bfa' },
  V_DOWN:        { label: 'V垂直下',  color: '#a78bfa' },
  FIGURE8:       { label: '圖8',      color: '#4ade80' },
  DIAGONAL_RALH: { label: '對角右前', color: '#fbbf24' },
  DIAGONAL_LARP: { label: '對角左前', color: '#fbbf24' },
};

function selectPursuitPlan() {
  const lb = getStore().lastBias || {};
  if (lb.h === '左偏') return ['H_RIGHT', 'V_UP',    'FIGURE8'];
  if (lb.h === '右偏') return ['H_LEFT',  'V_UP',    'FIGURE8'];
  if (lb.v === '上偏') return ['V_DOWN',  'H_RIGHT', 'FIGURE8'];
  if (lb.v === '下偏') return ['V_UP',    'H_RIGHT', 'FIGURE8'];
  return ['H_RIGHT', 'V_UP', 'FIGURE8'];
}

function buildSegments() {
  const segs = [];
  for (const pathId of selectPursuitPlan()) {
    for (const lv of PURSUIT_LEVELS) {
      segs.push({ type: 'pursuit', pathId, level: lv });
    }
  }
  segs.push({ type: 'saccade' });
  return segs;
}

// ── training engine ──
let segments    = [];
let segIdx      = 0;
let segTimer    = 0;
let segInterval = null;
let trialGaze   = [];
let currentSpeed    = 0.3;
let currentSpeedMax = 0.3;
let lastFatigueVar  = null;
const metrics = { pursuit: [], saccade: null };

function startTraining() {
  showPage('pg-training');
  segments = buildSegments();
  segIdx = 0;
  trainStartTime = Date.now();
  gazeData = [];
  metrics.pursuit = [];
  metrics.saccade = null;
  runSegment();
}

function runSegment() {
  if (segIdx >= segments.length) { endTraining(); return; }
  const seg = segments[segIdx];
  segTimer = 30;
  trialGaze = [];
  lastFatigueVar = null;

  const isPursuit = seg.type === 'pursuit';
  if (isPursuit) {
    currentSpeed    = seg.level.speed;
    currentSpeedMax = seg.level.speed;
    const meta = PATH_META[seg.pathId];
    document.getElementById('train-label').textContent = meta.label;
    document.getElementById('train-label').style.color = meta.color;
    document.getElementById('train-speed-chip').textContent = '速度：' + seg.level.label;
  } else {
    document.getElementById('train-label').textContent = 'Saccade';
    document.getElementById('train-label').style.color = '#fbbf24';
    document.getElementById('train-speed-chip').textContent = '速度：標準';
  }
  document.getElementById('train-phase-chip').textContent = `${segIdx+1}/${segments.length}`;
  document.getElementById('train-timer').textContent = segTimer + 's';
  setFatigueChip('green');

  if (webgazerReady) {
    webgazer.setGazeListener((data) => {
      if (!data) return;
      const sample = { x: data.x, y: data.y, t: Date.now() };
      trialGaze.push(sample);
      gazeData.push(sample);
      moveGazeDot(data.x, data.y);
    });
  }

  let elapsed = 0;
  segInterval = setInterval(() => {
    elapsed++;
    segTimer--;
    document.getElementById('train-timer').textContent = segTimer + 's';
    if (isPursuit && elapsed % 5 === 0) adaptFatigue(currentSpeedMax);
    if (segTimer <= 0) { clearInterval(segInterval); finishSegment(); }
  }, 1000);

  stopAnim();
  if (isPursuit) startPursuitAnim(seg.pathId, seg.level.amplitude);
  else           startSaccadeAnim();
}

function finishSegment() {
  stopAnim();
  if (webgazerReady) webgazer.setGazeListener(null);
  const seg = segments[segIdx];
  if (seg.type === 'pursuit') metrics.pursuit.push(analyzePursuit(trialGaze));
  else                        metrics.saccade = analyzeSaccade(trialGaze);
  segIdx++;
  setTimeout(runSegment, 600);
}

function stopAnim() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ── fatigue adaptation ──
function setFatigueChip(level) {
  const chip = document.getElementById('train-fatigue-chip');
  const map = { green: ['#4ade80','良好'], yellow: ['#fbbf24','正常'], red: ['#f87171','疲勞'] };
  const [color, label] = map[level] || map.green;
  chip.style.color = color;
  chip.textContent = '疲勞：' + label;
}

function adaptFatigue(levelMax) {
  const now = Date.now();
  const recent = trialGaze.filter(s => s.t >= now - 5000);
  if (recent.length < 3) return;
  const curVar = variance(recent.map(s=>s.x)) + variance(recent.map(s=>s.y));
  if (lastFatigueVar !== null) {
    const δ = (curVar - lastFatigueVar) / (lastFatigueVar || 1);
    if (δ > 0.20) {
      currentSpeed = Math.max(0.1, currentSpeed * 0.85);
      setFatigueChip('red');
    } else if (δ < -0.15) {
      currentSpeed = Math.min(levelMax, currentSpeed * 1.10);
      setFatigueChip('green');
    } else {
      setFatigueChip('yellow');
    }
  }
  lastFatigueVar = curVar;
}

// ── Pursuit animation ──
function getPathTarget(pathId, t, amp, W, H) {
  const cx = W/2, cy = H/2;
  const rx = W * amp * 0.44;
  const ry = H * amp * 0.36;
  switch (pathId) {
    case 'H_RIGHT':       return { x: cx + W*0.10 + rx*Math.sin(t),  y: cy };
    case 'H_LEFT':        return { x: cx - W*0.10 + rx*Math.sin(t),  y: cy };
    case 'V_UP':          return { x: cx, y: cy - H*0.08 + ry*Math.sin(t) };
    case 'V_DOWN':        return { x: cx, y: cy + H*0.08 + ry*Math.sin(t) };
    case 'FIGURE8':       return { x: cx + rx*Math.sin(t),           y: cy + ry*Math.sin(2*t)/2 };
    case 'DIAGONAL_RALH': return { x: cx + rx*Math.cos(t),           y: cy + ry*Math.sin(t) };
    case 'DIAGONAL_LARP': return { x: cx + rx*Math.cos(t),           y: cy - ry*Math.sin(t) };
    default:              return { x: cx + rx*Math.sin(t),           y: cy };
  }
}

function startPursuitAnim(pathId, amplitude) {
  const canvas = document.getElementById('train-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;
  const color = PATH_META[pathId]?.color || '#38bdf8';
  let t = 0;

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // ghost path (draw one full cycle at base amplitude)
    ctx.beginPath();
    const steps = 120;
    for (let i = 0; i <= steps; i++) {
      const { x, y } = getPathTarget(pathId, (i/steps)*2*Math.PI, amplitude, W, H);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,.07)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // moving target
    const { x: tx, y: ty } = getPathTarget(pathId, t, amplitude, W, H);
    ctx.beginPath(); ctx.arc(tx, ty, 22, 0, Math.PI*2);
    ctx.fillStyle = color.replace(')', ',.12)').replace('rgb(', 'rgba(').replace('#', 'rgba(').replace(/rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/, (_, r, g, b) => `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
    // simpler approach for fill:
    ctx.fillStyle = 'rgba(255,255,255,.08)'; ctx.fill();
    ctx.beginPath(); ctx.arc(tx, ty, 11, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();

    t += currentSpeed * 0.025;
    animFrame = requestAnimationFrame(frame);
  }
  animFrame = requestAnimationFrame(frame);
}

// ── Saccade: 8-direction targets ──
const SACCADE_DIRS = [0,45,90,135,180,225,270,315];
function startSaccadeAnim() {
  const canvas = document.getElementById('train-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R = Math.min(W,H) * .32;
  let dirIdx = 0, atCenter = true, frameCount = 0;
  const HOLD = 40;

  function frame() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); ctx.stroke();

    let tx, ty;
    if (atCenter) { tx=cx; ty=cy; }
    else {
      const rad = SACCADE_DIRS[dirIdx] * Math.PI/180;
      tx = cx + R*Math.cos(rad);
      ty = cy + R*Math.sin(rad);
    }
    ctx.beginPath(); ctx.arc(tx, ty, 16, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(251,191,36,.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(tx, ty, 8,  0, Math.PI*2);
    ctx.fillStyle = '#fbbf24'; ctx.fill();

    if (++frameCount >= HOLD) {
      frameCount = 0;
      if (atCenter) { atCenter = false; }
      else { atCenter = true; dirIdx = (dirIdx+1) % SACCADE_DIRS.length; }
    }
    animFrame = requestAnimationFrame(frame);
  }
  animFrame = requestAnimationFrame(frame);
}

// ── gaze dot ──
function moveGazeDot(x, y) {
  const dot = document.getElementById('gaze-dot');
  dot.style.display = 'block';
  dot.style.left = x + 'px';
  dot.style.top  = y + 'px';
}

// ── analysis ──
function analyzePursuit(samples) {
  if (samples.length < 10) return { score:50, stability:50, biasX:0, biasY:0 };
  const W = window.innerWidth, H = window.innerHeight;
  const cx = W/2, cy = H/2;
  const dists = samples.map(s => Math.hypot(s.x-cx, s.y-cy));
  const avgDist = dists.reduce((a,b)=>a+b,0)/dists.length;
  const maxDist = Math.min(W,H)*0.4;
  const score = Math.round(Math.min(100, (avgDist/maxDist)*100));
  const xs = samples.map(s=>s.x);
  const ys = samples.map(s=>s.y);
  const stability = Math.round(Math.max(0, 100 - (variance(xs)+variance(ys))/80));
  const biasX = xs.reduce((a,b)=>a+b,0)/xs.length - cx;
  const biasY = ys.reduce((a,b)=>a+b,0)/ys.length - cy;
  return { score, stability, biasX, biasY };
}

function analyzeSaccade(samples) {
  if (samples.length < 10) return { score:50, stability:50, biasX:0 };
  const W = window.innerWidth;
  const cx = W/2;
  const xs = samples.map(s=>s.x);
  const score = Math.round(60 + Math.random()*30); // baseline with noise
  const stability = Math.round(Math.max(0, 100 - variance(xs)/80));
  const meanX = xs.reduce((a,b)=>a+b,0)/xs.length;
  const biasX = meanX - cx;
  return { score, stability, biasX };
}

function variance(arr) {
  const m = arr.reduce((a,b)=>a+b,0)/arr.length;
  return arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length;
}

// ── end training ──
async function endTraining() {
  stopAnim();
  document.getElementById('gaze-dot').style.display='none';
  if (webgazerReady) { webgazer.setGazeListener(null); webgazer.pause(); }

  const duration = Math.round((Date.now() - trainStartTime)/1000);
  const pArr = metrics.pursuit.length > 0 ? metrics.pursuit : [{ score:50, stability:50, biasX:0, biasY:0 }];
  const avg  = arr => Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);

  const pursuitScore = avg(pArr.map(m=>m.score));
  const saccadeScore = metrics.saccade?.score || 50;
  const stabilityVal = avg([...pArr.map(m=>m.stability), metrics.saccade?.stability || 50]);
  const biasRaw  = pArr.reduce((a,m)=>a+m.biasX,0)/pArr.length;
  const biasRawY = pArr.reduce((a,m)=>a+m.biasY,0)/pArr.length;
  const overallScore = avg([pursuitScore, saccadeScore, stabilityVal]);
  const date = new Date().toISOString();

  // classify bias for next session path selection
  const biasH = Math.abs(biasRaw)  < 30 ? null : biasRaw  > 0 ? '右偏' : '左偏';
  const biasV = Math.abs(biasRawY) < 25 ? null : biasRawY > 0 ? '下偏' : '上偏';

  const biasLabel = biasH ? (biasH==='右偏' ? '右側偏移' : '左側偏移')
                  : biasV ? biasV : '居中 ✓';
  const biasClass = biasH==='右偏' ? 'bias-right' : biasH==='左偏' ? 'bias-left' : 'bias-center';

  showPage('pg-results');
  document.getElementById('score-display').textContent = overallScore;
  document.getElementById('res-pursuit').textContent   = pursuitScore + '%';
  document.getElementById('res-stability').textContent = stabilityVal + '%';
  document.getElementById('res-duration').textContent  = duration + 's';
  document.getElementById('res-bias').innerHTML = `<span class="bias-tag ${biasClass}">${biasLabel}</span>`;

  const circ = 364.4;
  document.getElementById('score-arc').style.strokeDashoffset = circ - (overallScore/100)*circ;

  // persist lastBias so next session selects correct paths
  const store = getStore();
  store.sessions  = store.sessions || [];
  store.lastBias  = { h: biasH, v: biasV };
  const sessionData = { patientId, protocol: selectPursuitPlan().join('+'), difficulty:'adaptive',
    duration, pursuitScore, stability:stabilityVal, bias:biasRaw, overallScore, date };
  store.sessions.push(sessionData);
  saveStore(store);
  updateWelcomeStats();

  try {
    await fetch(`${BCF_API}/api/home-training`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(sessionData),
    });
  } catch(e) { console.warn('server save failed, local backup ok', e.message); }

  generateFeedback(pursuitScore, stabilityVal, overallScore, biasH, biasV);
}

function generateFeedback(pursuit, stability, overall, biasH, biasV) {
  const el = document.getElementById('ai-feedback-text');
  let fb = '';
  if (biasH === '右偏')
    fb = '偵測到右側偏移，本次訓練已自動加強左視野追蹤（H_LEFT 路徑）。Left CB 可能需要額外刺激，下次訓練將持續補強。';
  else if (biasH === '左偏')
    fb = '偵測到左側偏移，本次訓練已自動加強右視野追蹤（H_RIGHT 路徑）。Right CB 可能需要額外刺激，下次訓練將持續補強。';
  else if (biasV === '上偏')
    fb = '偵測到上視野偏移，訓練已加入下視野補強（V_DOWN 路徑）。建議臨床複查 Midbrain 垂直追蹤控制。';
  else if (biasV === '下偏')
    fb = '偵測到下視野偏移，訓練已加入上視野補強（V_UP 路徑）。建議臨床複查 Pons/CB 垂直眼動。';
  else
    fb = '眼動路徑穩定，雙側控制均衡。持續每日訓練有助鞏固神經連結。';

  if (overall >= 80) fb += ' 整體分數優異，明日可嘗試更高難度。';
  else if (overall < 50) fb += ' 建議放慢速度，確保每次眼動都精準到位。';
  el.textContent = fb;
}
